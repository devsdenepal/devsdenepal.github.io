        body {
            background-color: darkgray;

        body #container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 100%;
            margin: 0 auto;
            text-align: center;
            letter-spacing: 0.15em;
        }

        @media screen and (max-width: 525px) {
            body #container {
                top: calc(50% - -25px);
            }
        }

        body #container #cake {
            margin: 0 auto 10rem;
            width: 200px;
            height: 50px;
            background-color: #8a6b58;
            border-radius: 100%;
            box-shadow: 0px 4px 0px #6b5344, 0px 8px 0px #6b5344, 0px 12px 0px #6b5344, 0px 16px 0px #6b5344, 0px 20px 0px #6b5344, 0px 24px 0px #6b5344, 0px 28px 0px #6b5344, 0px 32px 0px #f8ecc9, 0px 36px 0px #f8ecc9, 0px 40px 0px #ca6060, 0px 44px 0px #ca6060, 0px 48px 0px #f8ecc9, 0px 52px 0px #f8ecc9, 0px 56px 0px #6b5344, 0px 60px 0px #6b5344, 0px 64px 0px #6b5344, 0px 68px 0px #6b5344, 0px 72px 0px #6b5344, 0px 76px 0px #6b5344, 0px 80px 0px #6b5344;
        }

        @media screen and (max-width: 525px) {
            body #container #cake {
                margin: 0 auto 9rem;
            }
        }

        body #container #cake::before {
            content: "";
            position: absolute;
            width: 7px;
            height: 5px;
            background-color: lightblue;
            box-shadow: 0px 5px 0px white, 0px 10px 0px lightblue, 0px 15px 0px white, 0px 20px 0px lightblue, 0px 25px 0px white, 0px 30px 0px lightblue, 0px 35px 0px white, 0px 40px 0px lightblue, 0px 45px 0px white, 0px 50px 0px lightblue;
            top: -25px;
        }

        body #container #cake #flame {
            width: 18px;
            height: 18px;
            background: yellow;
            position: absolute;
            z-index: 6;
            border-radius: 80% 0 55% 50%/55% 0 80% 50%;
            left: 50%;
            top: -40px;
            margin-left: -5px;
            transform: rotateZ(-45deg);
            animation: flame-flicker 0.9s ease infinite;
        }

        body #container #cake #flame #inner-flame {
            width: 10px;
            height: 10px;
            background: #d1835c;
            position: absolute;
            z-index: 8;
            border-radius: 80% 0 55% 50%/55% 0 80% 50%;
            left: 50%;
            margin-left: -7px;
            bottom: 2px;
            opacity: 0.4;
        }

        body #container #cake .underline {
            position: relative;
            bottom: -150px;
            left: 50%;
            -webkit-transform: translateX(-50%);
            transform: translateX(-50%);
            width: 130px;
            height: 1px;
            background-color: #c3c3c3;
        }

        body #container #cake .underline::before,
        body #container #cake .underline::after {

            height: 1px;
            left: 50%;

        body #container #cake .underline::before {

            width: 110px;
            background-color: #c3c3c3;
        }

        body #container #cake .underline::after {
            top: 20px;
            width: 90px;
            background-color: #c3c3c3;
        }

        body #container #countdown #cdDays,
        body #container #countdown #cdHours,
        body #container #countdown #cdMins,
        body #container #countdown #cdSecs {

            width: 24%;

        @media screen and (max-width: 767px) {

            body #container #countdown #cdSecs {
                width: 22%;

        }

        @media screen and (max-width: 525px) {

            body #container #countdown #cdDays,
            body #container #countdown #cdHours,
            body #container #countdown #cdMins,
            body #container #countdown #cdSecs {

        @media screen and (max-width: 525px) {

            body #container #countdown #cdDays,

        body #container #countdown .spacer {

            content: "";

            height: 20px;
            background: white;

        body #container #countdown .spacer::before,

        @media screen and (max-width: 525px) {

        @media screen and (max-width: 450px) {

<body>
    <div id="container">
        <div id="cake">
            <div id="flame">
                <div id="inner-flame"></div>
            </div>
            <div class="underline"></div>
        </div>
        <div id="countdown">
            <div id="cdDays">
                <div class="spacer"></div>
                <div id="daysNum"></div>
                <div class="label">DAY(S)</div>
            </div>
            <div id="cdHours">
                <div class="spacer"></div>
                <div id="hoursNum"></div>
                <div class="label">HOURS</div>
            </div>
            <div id="cdMins">
                <div class="spacer"></div>
                <div id="minsNum"></div>
                <div class="label">MINUTES</div>
            </div>
            <div id="cdSecs">
                <div class="spacer"></div>
                <div id="secsNum"></div>
                <div class="label">SECONDS</div>
            </div>
            <div id="text"></div>
        </div>
    </div>

</body>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const wish_to = urlParams.get('to').toLocaleUpperCase();
    const wish_from = urlParams.get('from').toLocaleUpperCase();
    let the_title = "Happy birtday " + "dear " + wish_to + "!! With love from " + wish_from;
    let the_message = "UNTIL " + wish_to + "'s BIRTHDAY </br> - From " + wish_from;
    let text = document.getElementById("text");
    text.innerHTML = the_message;
    document.title = the_title;
    let quotes = {
        1: "1 rupay ko pespi " + wish_to + " seucy", 2: "East or best..." + wish_to + " is best", 3: "May God fulfil all of you wishes...except what I don't want to be fulfilled ;>", 4: "Patak patak yo din aaos ,Patak patak yo dil gaos ,Timi bachnu hazaraou barsa ,Yahi nai chha mero kamana Happy B’day To You !!!"
    }

    // Set the date we're counting down to
    var endDate = new Date("Dec, 22, 2022, 23:59:59").getTime();
    // Update the count down every 1 second
    var now = new Date().getTime();
    console.log(now, endDate)
    // Find the distance between now an the count down date
    var distance = endDate - now;
    var x = setInterval(function () {
        // Get todays date and time
        var now = new Date().getTime();
        console.log(now, endDate)
        // Find the distance between now an the count down date
        var distance = endDate - now;
        console.log(distance)
        // Time calculations for days, hours, minutes and seconds
        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);
        // Output the result in elements with id="cdHour/cdMin/cdSec"
        document.getElementById("daysNum").innerHTML = ("0" + days).slice(-2);
        document.getElementById("hoursNum").innerHTML = ("0" + hours).slice(-2);
        document.getElementById("minsNum").innerHTML = ("0" + minutes).slice(-2);
        document.getElementById("secsNum").innerHTML = ("0" + seconds).slice(-2);
        // If the count down is over, write some text 
        if (distance < 0) {
            clearInterval(x);
            document.getElementById("daysNum").innerHTML = ("0");
            document.getElementById("hoursNum").innerHTML = ("0");
            document.getElementById("minsNum").innerHTML = ("0");
            document.getElementById("secsNum").innerHTML = ("0");
            document.getElementById("text").innerHTML = "Happy Birthday Dear " + wish_to + "!!</br> -from " + wish_from;
            const quote_suggested = quotes[Math.floor(Math.random() * 4)];
            text.innerHTML += "</br>" + quote_suggested;
        }
    }, 1000);
</script>
