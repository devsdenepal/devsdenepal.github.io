<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background-color: #000;
      margin: 0;
    }

    #demo {
      display: block;
      position: relative;
      top: 0;
      left: 0;
      background-color: yellow;
      border-radius: 50%;
      width: 25px;
      height: 25px;
    }

    .rooted {
      display: block;
      position: relative;
      top: 40%;
      left:%;
      background-color: blue;
      border-radius: 50%;
      width: 25px;
      height: 25px;
    }

    #coordinates {
      position: relative;
      display: none;
      color: #ff0000;
    }

    #demo:hover>#coordinates {
      display: block;
    }

    :root {
      --size: 284px;
    }

    .map {
      z-index: -1;
      position: fixed;
      top: 40%;
      left: 45%;
      background: url(https://gtms03.alicdn.com/tps/i3/TB1Vet9IVXXXXbuapXXb2YSIVXX-567-567.png) no-repeat 50% 50%;
      width: var(--size);
      height: var(--size);

      background-size: var(--size) var(--size);


    }


    .map:hover {
      background: none;
    }

    .map .pointer {
      position: absolute;
      z-index: 1024;
      left: 10.5820106%;
      right: 10.5820106%;
      top: 10.5820106%;
      bottom: 50%;
      will-change: transform;
      transform-origin: 50% 100%;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      background-image: linear-gradient(135deg,
          rgba(5, 162, 185, 0.8) 0%,
          rgba(0, 0, 0, 0.02) 70%,
          rgba(0, 0, 0, 0) 100%);
      clip-path: polygon(100% 0,
          100% 10%,

          100%=> 135deg 50% 100%, 0 100%, 0 0);

      animation: rotate360 3s infinite linear;
    }

    .map .pointer:after {
      content: "";
      position: absolute;
      width: 50%;
      bottom: -1px;
      border-top: 2px solid rgba(0, 231, 244, 0.8);
      box-shadow: 0 0 3px rgba(0, 231, 244, 0.6);
      border-radius: 9px;
    }

    .shadow {
      position: absolute;
      left: 11%;
      top: 11%;
      right: 11%;
      bottom: 11%;
      margin: auto;
      border-radius: 9999px;
      box-shadow: 0 0 66px 6px #A51414;
      animation: shadow 1s infinite ease;
    }


    @keyframes rotate360 {
      0% {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes shadow {
      0% {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="map">
    <div class="pointer"></div>
    <div class="shadow"></div>
    <p id="demo" style="display: block;
position: fixed;
top: 0;left: 0;"><span id="coordinates"></span></p>
    <p class="rooted"></p>
  </div>

  <script>
    window.onload = getLocation();
    var x = document.getElementById("coordinates");
    // setInterval("getLocation()",1000);
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition);
      }
      if (window.location.hostname !== "localhost") {
        alert("Attention !!\n We are not able to find your location, please visit our local version.\n -Gautam Kumar")
        const point = document.getElementById("demo");
        let leftP = 27.7172 + 15 + "%";
        let topP = 85.3240 - 25 + "%";
        point.style.top = topP;
        point.style.left = leftP;


      }
    }

    function showPosition(position) {
      x.innerHTML = "<br/><br/>(" + position.coords.latitude +
        "," + position.coords.longitude + ")";
      const point = document.getElementById("demo");
      let leftP = position.coords.latitude + 15 + "%";
      let topP = position.coords.longitude - 25 + "%";
      point.style.top = topP;
      point.style.left = leftP;
    }
  </script>

</body>
